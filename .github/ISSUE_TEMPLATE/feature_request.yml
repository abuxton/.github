name: Feature Request
description: Suggest an idea or enhancement for this project
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
        Please provide as much detail as possible — well-structured requests are easier to review
        and can be acted on directly by GitHub Copilot.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear and concise description of the problem this feature would solve.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you would like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you have considered and why you prefer your proposed solution.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the conditions that must be met for this feature to be considered complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation Notes
      description: |
        Optional hints for implementation: relevant files, modules, APIs, or architectural considerations.
        This context helps GitHub Copilot and contributors understand the scope and approach.
      placeholder: |
        - Likely affects: src/foo/bar.ts
        - Could reuse existing helper: lib/utils.py
        - External API: https://example.com/api/docs

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have described the problem clearly
          required: true
        - label: I have defined acceptance criteria
          required: true
