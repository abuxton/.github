name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        The more detail you provide, the easier it is to reproduce and fix — and the better
        GitHub Copilot can assist with a resolution.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happens.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide relevant environment details.
      placeholder: |
        - OS: [e.g. Ubuntu 22.04, macOS 14]
        - Version / Branch: [e.g. v1.2.3 or `main`]
        - Relevant tool versions: [e.g. Node 20, Python 3.12]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste relevant log output.
      render: shell

  - type: textarea
    id: relevant-files
    attributes:
      label: Relevant Files or Modules
      description: |
        List any source files, modules, or components likely related to this bug.
        This context helps GitHub Copilot and reviewers quickly locate the affected code.
      placeholder: |
        - src/foo/bar.ts
        - lib/utils.py

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have provided clear reproduction steps
          required: true
        - label: I have described the expected vs actual behavior
          required: true
